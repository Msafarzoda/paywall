<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <title>Zehn App Icon</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#82FF7F"/>
      <stop offset="100%" stop-color="#92F090"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="400" height="400" rx="108" fill="url(#bg)"/>

  <!-- Z mark: scaled from 24x24 viewBox to fit icon -->
  <g transform="translate(85, 85) scale(9.58)">
    <rect x="3" y="4" width="18" height="2.6" rx="1.3" fill="#03212E"/>
    <rect x="3" y="10.7" width="18" height="2.6" rx="1.3" fill="#03212E" transform="rotate(-32 12 12)"/>
    <rect x="3" y="17.4" width="18" height="2.6" rx="1.3" fill="#03212E"/>
  </g>

</svg>
